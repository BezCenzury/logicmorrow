<!-- ============================================================
     LOGICMORROW MARK — Sam znak graficzny (sygnet)
     Symbol Logiki i Rozwoju (L + M + Węzły)
     ============================================================ -->
<svg width="40" height="40" viewBox="0 0 46 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Ścieżka bazowa -->
    <path d="M10 8V32H20" stroke="url(#mark-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 32L28 12L36 32" stroke="url(#mark-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Węzły (kropki) -->
    <circle cx="10" cy="8" r="3.5" fill="#3b82f6"/>
    <circle cx="28" cy="12" r="3.5" fill="#60a5fa"/>
    <circle cx="36" cy="32" r="3.5" fill="#2563eb"/>

    <defs>
        <linearGradient id="mark-gradient" x1="10" y1="8" x2="36" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
    </defs>
</svg>

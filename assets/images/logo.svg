<!-- ============================================================
     LOGO LOGICMORROW — Finalne logo SVG
     Projekt: Abstract LM Flow (Połączenie Logiki i Przyszłości)
     ============================================================ -->
<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LogicMorrow">
    
    <!-- Symbol: Abstrakcyjny znak 'LM' z węzłami logicznymi -->
    <g id="logicmorrow-mark">
        <!-- Ścieżka bazowa L przechodząca w M -->
        <path d="M10 8V32H20" stroke="url(#logo-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 32L28 12L36 32" stroke="url(#logo-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        
        <!-- Węzły logiczne (dots) na końcach ścieżek -->
        <circle cx="10" cy="8" r="3.5" fill="#3b82f6"/>
        <circle cx="28" cy="12" r="3.5" fill="#60a5fa"/>
        <circle cx="36" cy="32" r="3.5" fill="#2563eb"/>
    </g>

    <!-- Wordmark -->
    <text x="50" y="27" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">
        Logic<tspan fill="#3b82f6">Morrow</tspan>
    </text>

    <!-- Definicje — Gradienty -->
    <defs>
        <linearGradient id="logo-gradient" x1="10" y1="8" x2="36" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
    </defs>
</svg>
